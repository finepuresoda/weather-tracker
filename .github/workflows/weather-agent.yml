name: Weather Agent

on:
  schedule:
    - cron: '0 7,12,17,22 * * *'
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather script
        run: python weather.py

      - name: Commit updated data    # --- just added
        run: |                       # --- just added
          git config user.name "Weather Agent"
          git config user.email "actions@github.com"
          git add *.csv *.png
          git commit -m "Update weather data $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main
          git push
